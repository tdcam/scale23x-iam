---
- name: Playbook to configure IPA server
  hosts: idm
  become: true
  gather_facts: true

  vars:
    # Basic Setup
    ipaserver_domain: redhat.lan
    ipaserver_realm: REDHAT.LAN
    ipaadmin_password: CHANGEME
    ipadm_password: CHANGEME
    ipaserver_hostname: idm.redhat.lan
    ipaserver_ip_addresses: ["192.168.122.2"]

    # DNS Configuration
    ipaserver_setup_dns: yes
    ipaserver_no_host_dns: yes
    ipaserver_auto_reverse: yes
    ipaserver_forwarders:
      - 8.8.8.8
      - 4.2.2.2

    # Other Options
    ipaclient_mkhomedir: yes
    ipaclient_install_ntp: yes
    ipaclient_ntp_pool: pool.ntp.org

  roles:
    - role: freeipa.ansible_freeipa.ipaserver

  tasks:
    - name: Ensure Forward Zone has GSS-TSIG and Subdomain update policies
      freeipa.ansible_freeipa.ipadnszone:
        name: "{{ ipaserver_domain }}"
        dynamic_update: true
        update_policy: "grant {{ ipaserver_realm }} krb5-self * A; grant {{ ipaserver_realm }} krb5-self * AAAA; grant {{ ipaserver_realm }} krb5-self * SSHFP; grant {{ ipaserver_realm }} krb5-subdomain {{ ipaserver_domain }}. ANY;"
        ipaadmin_password: "{{ ipaadmin_password }}"
        ipaadmin_principal: admin

    - name: Ensure Reverse Zone has GSS-TSIG and Subdomain update policies
      freeipa.ansible_freeipa.ipadnszone:
        name: "100.31.172.in-addr.arpa."
        dynamic_update: true
        update_policy: "grant {{ ipaserver_realm }} krb5-self * PTR; grant {{ ipaserver_realm }} krb5-subdomain 122.168.192.in-addr.arpa. ANY;"
        ipaadmin_password: "{{ ipaadmin_password }}"
        ipaadmin_principal: admin

    - name: Allow PTR synchronization globally
      freeipa.ansible_freeipa.ipadnsconfig:
        allow_sync_ptr: true
        ipaadmin_password: "{{ ipaadmin_password }}"
        ipaadmin_principal: admin
