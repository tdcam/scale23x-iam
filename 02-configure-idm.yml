---
- name: Playbook to configure IPA server
  hosts: ipaserver
  become: true
  vars:
    # Basic Setup
    ipaserver_domain: redhat.lan
    ipaserver_realm: REDHAT.LAN
    ipaadmin_password: CHANGEME
    ipadm_password: CHANGEME
    ipaserver_hostname: idm.redhat.lan
    ipaserver_ip_addresses: ["192.168.122.2"]

    # DNS Configuration
    ipaserver_setup_dns: yes
    ipaserver_no_host_dns: yes
    ipaserver_auto_reverse: yes
    ipaserver_forwarders:
      - 8.8.8.8
      - 4.2.2.1

    # Other Options
    ipaclient_mkhomedir: yes
    ipaclient_ntp_pool: pool.ntp.org

  roles:
    - role: freeipa.ansible_freeipa.ipaserver
      state: present
