{
    "Dhcp4": {
        "interfaces-config": {
            "interfaces": [ "enp1s0" ]
        },
        "control-sockets": {
            "dhcp4": {
                "socket-type": "unix",
                "socket-name": "/tmp/kea-dhcp4-ctrl.sock"
            }
        },
        "lease-database": {
            "type": "memfile",
            "persist": true,
            "name": "/var/lib/kea/kea-leases4.csv"
        },
        "valid-lifetime": 600,

        "dhcp-ddns": {
            "enable-updates": true,
            "server-ip": "127.0.0.1",
            "server-port": 53001,
            "ncr-protocol": "JSON",
            "ncr-format": "JSON",
            "qualifying-suffix": "redhat.lan",
            "override-client-update": true,
            "override-no-update": true
        },

        "hooks-libraries": [
            {
                "library": "/usr/lib64/kea/hooks/libdhcp_lease_cmds.so"
            },
            {
                "library": "/usr/lib64/kea/hooks/libdhcp_stat_cmds.so"
            }
        ],

        "subnet4": [
            {
                "id": 1,
                "subnet": "192.168.122.0/24",
                "next-server": "192.168.122.2",
                "pools": [
                    {
                        "pool": "192.168.122.128 - 192.168.122.254"
                    }
                ],
                "option-data": [
                    {
                        "name": "routers",
                        "data": "192.168.122.1"
                    },
                    {
                        "name": "domain-name-servers",
                        "data": "192.168.122.2"
                    },
                    {
                        "name": "domain-name",
                        "data": "redhat.lan"
                    }
                ],
                "reservations": [
                    {
                        "hostname": "filer",
                        "ip-address": "192.168.122.3",
                        "hw-address": "52:54:00:c1:cd:7c"
                    },
                    {
                        "hostname": "db",
                        "ip-address": "192.168.122.4",
                        "hw-address": "52:54:00:68:d4:ef"
                    },
                    {
                        "hostname": "web",
                        "ip-address": "192.168.122.5",
                        "hw-address": "52:54:00:b9:52:b7"
                    },
                    {
                        "hostname": "workstation1",
                        "ip-address": "192.168.122.6",
                        "hw-address": "52:54:00:82:f1:11"
                    }
                ]
            }
        ]
    }
}

