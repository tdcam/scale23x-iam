---
- name: Install FreeIPA Client
  hosts: workstation1.redhat.lan
  become: true
  vars:
    # Mirroring your command line arguments
    ipaadmin_principal: admin
    ipaadmin_password: CHANGEME
    ipaclient_domain: redhat.lan
    ipaclient_servers:
      - idm.redhat.lan
    ipaclient_ntp_servers:
      - idm.redhat.lan
    ipaclient_mkhomedir: true
    ipaclient_allow_dns_updates: true
    ipaclient_force_join: true
    # Note: The role handles hostname -f and hostname -i automatically
    # if ipaclient_use_otp is not used and dns is configured.

  tasks:
    - name: Import ipaclient role
      ansible.builtin.import_role:
        name: freeipa.ansible_freeipa.ipaclient
